services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: embox
      POSTGRES_USER: ${DB_USER:-embox}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-embox}"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build: ./server
    environment:
      DATABASE_URL: postgresql://${DB_USER:-embox}:${DB_PASSWORD}@db:5432/embox
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_EXPIRES_IN: 2h
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      RATE_LIMIT_MAX: "200"
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build: .
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  pgdata:
